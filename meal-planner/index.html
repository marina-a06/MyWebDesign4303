<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Planner</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
  <h1>Mom Life Command Center</h1>
</header>

<nav>
  <a href="../index.html">Home</a>
  <a href="../calendar/index.html">Calendar</a>
  <a href="../to-do-list/index.html">To-Do</a>
  <a href="../meal-planner/index.html">Meals</a>
</nav>



<div class="container">
  

  <div class="day">Monday: <input type="text" id="monday"></div>
<div class="day">Tuesday: <input type="text" id="tuesday"></div>
<div class="day">Wednesday: <input type="text" id="wednesday"></div>
<div class="day">Thursday: <input type="text" id="thursday"></div>
<div class="day">Friday: <input type="text" id="friday"></div>
<div class="day">Saturday: <input type="text" id="saturday"></div>
<div class="day">Sunday: <input type="text" id="sunday"></div>

</div>

<script>
const days = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];

function loadMeals() {
  let savedMeals = JSON.parse(localStorage.getItem("meals")) || {};

  days.forEach(day => {
    if (savedMeals[day]) {
      document.getElementById(day).value = savedMeals[day];
    }
  });
}

function saveMeals() {
  let meals = {};

  days.forEach(day => {
    meals[day] = document.getElementById(day).value;
  });

  localStorage.setItem("meals", JSON.stringify(meals));
}

days.forEach(day => {
  document.getElementById(day).addEventListener("input", saveMeals);
});

loadMeals();
</script>

</body>
</html>
