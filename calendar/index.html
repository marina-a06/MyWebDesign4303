<!DOCTYPE html>
<html lang="en">
<head>
    
  <meta charset="UTF-8">
  <title>Calendar</title>

<link rel="stylesheet" href="../style.css">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<header>
  <h1>Mom Life Command Center</h1>
</header>

<nav>
  <a href="../index.html">Home</a>
  <a href="../calendar/index.html">Calendar</a>
  <a href="../to-do-list/index.html">To-Do</a>
  <a href="../meal-planner/index.html">Meals</a>
</nav>

<div class="container">
  <!-- page content -->
</div>

  <div class="app">

    <div class="sidebar">
      <h2>Our Calendar</h2>
      <button id="clearEvents">Clear Events</button>
    </div>

    <div class="main">

      <div class="header">
        <h1>Family Calendar</h1>
      </div>

      
      <div id="calendar"></div>

    </div>

  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  
  
<script>
document.addEventListener('DOMContentLoaded', function () {

  const calendarEl = document.getElementById('calendar');

  const savedEvents = JSON.parse(localStorage.getItem('events')) || [];

  const calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    editable: true,
    selectable: true,
    events: savedEvents,

    dateClick: function(info) {
      const title = prompt("Enter event name:");

      if (title) {
        calendar.addEvent({
          title: title,
          start: info.dateStr,
          allDay: true
        });

        saveEvents();
      }
    },

    eventClick: function(info) {
      const newTitle = prompt("Edit event name:", info.event.title);

      if (newTitle === "") {
        info.event.remove();
      } else if (newTitle) {
        info.event.setProp('title', newTitle);
      }

      saveEvents();
    },

    eventChange: function() {
      saveEvents();
    }
  });

  calendar.render();

  function saveEvents() {
    const events = calendar.getEvents().map(event => ({
      title: event.title,
      start: event.start,
      end: event.end,
      allDay: event.allDay
    }));

    localStorage.setItem('events', JSON.stringify(events));
  }

  const clearBtn = document.getElementById('clearEvents');
  if (clearBtn) {
    clearBtn.addEventListener('click', function () {
      if (confirm("Delete all events?")) {
        localStorage.removeItem('events');
        calendar.removeAllEvents();
      }
    });
  }

});
</script>

<a href="../index.html">Back to Homepage</a>
</body>
</html>
