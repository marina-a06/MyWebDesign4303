<!DOCTYPE html>
<html lang="en">
<head>
    
  <meta charset="UTF-8">
  <title>Calendar</title>

<link rel="stylesheet" href="../style.css">

  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>

<body>



  <div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
      <h2>My Calendar</h2>
      <button id="clearEvents">Clear Events</button>
    </div>

    <!-- Main Content -->
    <div class="main">

      <!-- Header -->
      <div class="header">
        <h1>Dashboard</h1>
      </div>

      <!-- Calendar -->
      <div id="calendar"></div>

    </div>

  </div>

  <!-- FullCalendar JS -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

  <!-- Your calendar script -->
  

  
<script>
document.addEventListener('DOMContentLoaded', function () {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',

    editable: true,
    selectable: true,

    dateClick: function(info) {
      let title = prompt("Enter event name:");

      if (title) {
        calendar.addEvent({
          title: title,
          start: info.dateStr,
          allDay: true
        });
      }
    },

    eventClick: function(info) {
      let newTitle = prompt("Edit event name:", info.event.title);

      if (newTitle === "") {
        info.event.remove();
      } else if (newTitle) {
        info.event.setProp('title', newTitle);
      }
    }
  });

  calendar.render();
  document.getElementById('clearEvents').addEventListener('click', function () {
  if (confirm("Delete all events?")) {
    localStorage.removeItem('events');
    calendar.removeAllEvents();
  }
});
});
</script>

<a href="../index.html">Back to Homepage</a>
</body>
</html>
